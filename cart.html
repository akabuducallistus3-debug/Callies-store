<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart | Callie's Store</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container nav-content">
        <a href="index.html" class="logo">Callie's Store</a>
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="index.html#products" class="nav-link">Shop</a></li>
        </ul>
        <div class="nav-actions">
          <button id="theme-toggle" class="icon-btn">
            <i class="fas fa-moon"></i>
          </button>
          <a href="wishlist.html" class="icon-btn"
            ><i class="far fa-heart"></i
            ><span id="wishlist-count" class="badge">0</span></a
          >
          <a href="cart.html" class="icon-btn"
            ><i class="fas fa-shopping-cart"></i
            ><span id="cart-count" class="badge">0</span></a
          >
          <a href="login.html" id="user-btn" class="icon-btn"
            ><i class="far fa-user"></i
          ></a>
        </div>
      </div>
    </nav>

    <main class="container page-main">
      <h1 class="section-title">Your Shopping Cart</h1>

      <div id="cart-container" class="cart-layout">
        <!-- Cart items will be loaded here -->
        <div id="cart-items-list" class="cart-items-list">
          <div class="skeleton cart-item-skeleton"></div>
          <div class="skeleton cart-item-skeleton"></div>
        </div>

        <!-- Order Summary -->
        <div id="order-summary" class="order-summary-card">
          <h2 class="summary-title">
            Order Summary
          </h2>
          <div class="summary-row summary-row-muted">
            <span>Subtotal</span>
            <span id="subtotal-price">$0.00</span>
          </div>
          <div class="summary-row summary-row-muted">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-row summary-total-row">
            <span>Total</span>
            <span id="total-price">$0.00</span>
          </div>
          <a
            href="checkout.html"
            id="checkout-btn"
            class="btn btn-primary checkout-btn"
            >Proceed to Checkout</a
          >
        </div>
      </div>

      <div id="empty-cart-message" class="empty-state">
        <i class="fas fa-shopping-cart empty-state-icon"></i>
        <h2>Your cart is empty</h2>
        <p class="empty-state-text">
          Looks like you haven't added anything to your cart yet.
        </p>
        <a href="index.html#products" class="btn btn-primary">Start Shopping</a>
      </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/cart-page.js"></script>
  </body>
</html>
