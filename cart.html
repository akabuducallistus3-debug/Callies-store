<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart | Callie's Store</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container nav-content">
        <a href="index.html" class="logo">Callie's Store</a>
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="index.html#products" class="nav-link">Shop</a></li>
        </ul>
        <div class="nav-actions">
          <button id="theme-toggle" class="icon-btn">
            <i class="fas fa-moon"></i>
          </button>
          <a href="wishlist.html" class="icon-btn"
            ><i class="far fa-heart"></i
            ><span id="wishlist-count" class="badge">0</span></a
          >
          <a href="cart.html" class="icon-btn"
            ><i class="fas fa-shopping-cart"></i
            ><span id="cart-count" class="badge">0</span></a
          >
          <a href="login.html" id="user-btn" class="icon-btn"
            ><i class="far fa-user"></i
          ></a>
        </div>
      </div>
    </nav>

    <main class="container" style="padding: 4rem 0">
      <h1 class="section-title">Your Shopping Cart</h1>

      <div
        id="cart-container"
        class="cart-layout"
        style="
          display: grid;
          grid-template-columns: 1fr 350px;
          gap: 3rem;
          align-items: start;
        "
      >
        <!-- Cart items will be loaded here -->
        <div
          id="cart-items-list"
          style="display: flex; flex-direction: column; gap: 1.5rem"
        >
          <div class="skeleton" style="height: 150px"></div>
          <div class="skeleton" style="height: 150px"></div>
        </div>

        <!-- Order Summary -->
        <div
          id="order-summary"
          class="order-summary-card"
          style="
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 100px;
          "
        >
          <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem">
            Order Summary
          </h2>
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 1rem;
              color: var(--text-muted);
            "
          >
            <span>Subtotal</span>
            <span id="subtotal-price">$0.00</span>
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 1rem;
              color: var(--text-muted);
            "
          >
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-top: 1.5rem;
              padding-top: 1.5rem;
              border-top: 1px solid var(--border-color);
              font-weight: 700;
              font-size: 1.25rem;
            "
          >
            <span>Total</span>
            <span id="total-price">$0.00</span>
          </div>
          <a
            href="checkout.html"
            id="checkout-btn"
            class="btn btn-primary"
            style="width: 100%; text-align: center; margin-top: 2rem"
            >Proceed to Checkout</a
          >
        </div>
      </div>

      <div
        id="empty-cart-message"
        style="display: none; text-align: center; padding: 4rem 0"
      >
        <i
          class="fas fa-shopping-cart"
          style="
            font-size: 4rem;
            color: var(--border-color);
            margin-bottom: 2rem;
          "
        ></i>
        <h2>Your cart is empty</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem">
          Looks like you haven't added anything to your cart yet.
        </p>
        <a href="index.html#products" class="btn btn-primary">Start Shopping</a>
      </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/cart-page.js"></script>
  </body>
</html>
