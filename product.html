<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | Callie's Store</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="logo">Callie's Store</a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#products" class="nav-link">Shop</a></li>
      </ul>
      <div class="nav-actions">
        <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
        <a href="wishlist.html" class="icon-btn"><i class="far fa-heart"></i><span id="wishlist-count" class="badge">0</span></a>
        <a href="cart.html" class="icon-btn"><i class="fas fa-shopping-cart"></i><span id="cart-count" class="badge">0</span></a>
        <a href="login.html" id="user-btn" class="icon-btn"><i class="far fa-user"></i></a>
      </div>
    </div>
  </nav>

  <main class="container" style="padding: 4rem 0;">
    <div id="product-details" class="product-details-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem; align-items: start;">
      <!-- Product details will be loaded here -->
      <div class="skeleton" style="height: 500px;"></div>
      <div class="skeleton-info">
        <div class="skeleton" style="height: 40px; width: 80%; margin-bottom: 1rem;"></div>
        <div class="skeleton" style="height: 20px; width: 40%; margin-bottom: 2rem;"></div>
        <div class="skeleton" style="height: 100px; width: 100%; margin-bottom: 2rem;"></div>
        <div class="skeleton" style="height: 50px; width: 50%;"></div>
      </div>
    </div>

    <!-- Related Products -->
    <section style="margin-top: 6rem;">
      <h2 class="section-title">Related Products</h2>
      <div id="related-products" class="product-grid">
        <!-- Related products will be loaded here -->
      </div>
    </section>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/product-page.js"></script>
</body>
</html>
