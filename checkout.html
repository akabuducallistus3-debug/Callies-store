<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Callie's Store</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <!-- <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container nav-content">
        <a href="index.html" class="logo">Callie's Store</a>
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="index.html#products" class="nav-link">Shop</a></li>
        </ul>
        <div class="nav-actions">
          <button id="theme-toggle" class="icon-btn">
            <i class="fas fa-moon"></i>
          </button>
          <a href="wishlist.html" class="icon-btn"
            ><i class="far fa-heart"></i
            ><span id="wishlist-count" class="badge">0</span></a
          >
          <a href="cart.html" class="icon-btn"
            ><i class="fas fa-shopping-cart"></i
            ><span id="cart-count" class="badge">0</span></a
          >
          <a href="login.html" id="user-btn" class="icon-btn"
            ><i class="far fa-user"></i
          ></a>
        </div>
      </div>
    </nav>

    <main class="container page-main">
      <h1 class="section-title">Checkout</h1>

      <div id="checkout-layout" class="checkout-layout">
        <!-- Checkout Form -->
        <div id="checkout-form-container" class="checkout-form-container">
          <h2 class="checkout-section-title">
            Shipping Information
          </h2>
          <form id="checkout-form" class="checkout-form-grid">
            <div class="span-2">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                id="full-name"
                required
                class="form-input"
              />
            </div>
            <div class="span-2">
              <label class="form-label">Email Address</label>
              <input
                type="email"
                id="email"
                required
                class="form-input"
              />
            </div>
            <div class="span-2">
              <label class="form-label">Shipping Address</label>
              <input
                type="text"
                id="address"
                required
                class="form-input"
              />
            </div>
            <div>
              <label class="form-label">City</label>
              <input
                type="text"
                id="city"
                required
                class="form-input"
              />
            </div>
            <div>
              <label class="form-label">Postal Code</label>
              <input
                type="text"
                id="postal-code"
                required
                class="form-input"
              />
            </div>
            <div class="span-2 checkout-submit-wrap">
              <button type="submit" class="btn btn-primary checkout-submit-btn">
                Place Order
              </button>
            </div>
          </form>
        </div>

        <!-- Order Summary -->
        <div id="order-summary" class="order-summary-card">
          <h2 class="summary-title">
            Order Summary
          </h2>
          <div id="checkout-items-list" class="checkout-items-list">
            <!-- Checkout items will be loaded here -->
          </div>
          <div class="summary-row summary-row-muted">
            <span>Subtotal</span>
            <span id="subtotal-price">$0.00</span>
          </div>
          <div class="summary-row summary-row-muted">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-row summary-total-row">
            <span>Total</span>
            <span id="total-price">$0.00</span>
          </div>
        </div>
      </div>

      <!-- Success Message -->
      <div id="success-message" class="empty-state">
        <i class="fas fa-check-circle success-icon"></i>
        <h2>Order Placed Successfully!</h2>
        <p class="empty-state-text">
          Thank you for shopping with Callie's Store. Your order #<span
            id="order-id"
          ></span>
          is being processed.
        </p>
        <a href="index.html" class="btn btn-primary">Continue Shopping</a>
      </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/checkout-page.js"></script>
  </body>
</html>
