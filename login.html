<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Callie's Store</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container nav-content">
        <a href="index.html" class="logo">Callie's Store</a>
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="index.html#products" class="nav-link">Shop</a></li>
        </ul>
        <div class="nav-actions">
          <button id="theme-toggle" class="icon-btn">
            <i class="fas fa-moon"></i>
          </button>
          <a href="wishlist.html" class="icon-btn"
            ><i class="far fa-heart"></i
            ><span id="wishlist-count" class="badge">0</span></a
          >
          <a href="cart.html" class="icon-btn"
            ><i class="fas fa-shopping-cart"></i
            ><span id="cart-count" class="badge">0</span></a
          >
          <a href="login.html" id="user-btn" class="icon-btn"
            ><i class="far fa-user"></i
          ></a>
        </div>
      </div>
    </nav>

    <main
      class="container"
      style="
        padding: 4rem 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
      "
    >
      <div
        id="auth-container"
        style="
          background: var(--card-bg);
          padding: 3rem;
          border-radius: 16px;
          border: 1px solid var(--border-color);
          width: 100%;
          max-width: 450px;
          box-shadow: var(--shadow);
        "
      >
        <!-- Login Form -->
        <div id="login-form-container">
          <h2
            style="
              margin-bottom: 0.5rem;
              font-size: 1.75rem;
              text-align: center;
            "
          >
            Welcome Back
          </h2>
          <p
            style="
              color: var(--text-muted);
              text-align: center;
              margin-bottom: 2rem;
            "
          >
            Log in to your account to continue.
          </p>
          <form
            id="login-form"
            style="display: flex; flex-direction: column; gap: 1.5rem"
          >
            <div>
              <label
                style="display: block; margin-bottom: 0.5rem; font-weight: 500"
                >Email Address</label
              >
              <input
                type="email"
                id="login-email"
                required
                style="
                  width: 100%;
                  padding: 0.75rem 1rem;
                  border-radius: 8px;
                  border: 1px solid var(--border-color);
                  background: var(--bg-color);
                  color: var(--text-main);
                "
              />
            </div>
            <div>
              <label
                style="display: block; margin-bottom: 0.5rem; font-weight: 500"
                >Password</label
              >
              <input
                type="password"
                id="login-password"
                required
                style="
                  width: 100%;
                  padding: 0.75rem 1rem;
                  border-radius: 8px;
                  border: 1px solid var(--border-color);
                  background: var(--bg-color);
                  color: var(--text-main);
                "
              />
            </div>
            <button
              type="submit"
              class="btn btn-primary"
              style="width: 100%; padding: 1rem; margin-top: 1rem"
            >
              Log In
            </button>
          </form>
          <p
            style="
              text-align: center;
              margin-top: 2rem;
              color: var(--text-muted);
            "
          >
            Don't have an account?
            <a
              href="#"
              id="show-signup"
              style="color: var(--primary-color); font-weight: 600"
              >Sign Up</a
            >
          </p>
        </div>

        <!-- Signup Form -->
        <div id="signup-form-container" style="display: none">
          <h2
            style="
              margin-bottom: 0.5rem;
              font-size: 1.75rem;
              text-align: center;
            "
          >
            Create Account
          </h2>
          <p
            style="
              color: var(--text-muted);
              text-align: center;
              margin-bottom: 2rem;
            "
          >
            Join Callie's Store today.
          </p>
          <form
            id="signup-form"
            style="display: flex; flex-direction: column; gap: 1.5rem"
          >
            <div>
              <label
                style="display: block; margin-bottom: 0.5rem; font-weight: 500"
                >Full Name</label
              >
              <input
                type="text"
                id="signup-name"
                required
                style="
                  width: 100%;
                  padding: 0.75rem 1rem;
                  border-radius: 8px;
                  border: 1px solid var(--border-color);
                  background: var(--bg-color);
                  color: var(--text-main);
                "
              />
            </div>
            <div>
              <label
                style="display: block; margin-bottom: 0.5rem; font-weight: 500"
                >Email Address</label
              >
              <input
                type="email"
                id="signup-email"
                required
                style="
                  width: 100%;
                  padding: 0.75rem 1rem;
                  border-radius: 8px;
                  border: 1px solid var(--border-color);
                  background: var(--bg-color);
                  color: var(--text-main);
                "
              />
            </div>
            <div>
              <label
                style="display: block; margin-bottom: 0.5rem; font-weight: 500"
                >Password</label
              >
              <input
                type="password"
                id="signup-password"
                required
                style="
                  width: 100%;
                  padding: 0.75rem 1rem;
                  border-radius: 8px;
                  border: 1px solid var(--border-color);
                  background: var(--bg-color);
                  color: var(--text-main);
                "
              />
            </div>
            <button
              type="submit"
              class="btn btn-primary"
              style="width: 100%; padding: 1rem; margin-top: 1rem"
            >
              Sign Up
            </button>
          </form>
          <p
            style="
              text-align: center;
              margin-top: 2rem;
              color: var(--text-muted);
            "
          >
            Already have an account?
            <a
              href="#"
              id="show-login"
              style="color: var(--primary-color); font-weight: 600"
              >Log In</a
            >
          </p>
        </div>

        <!-- User Profile -->
        <div id="profile-container" style="display: none; text-align: center">
          <div
            style="
              width: 80px;
              height: 80px;
              background: var(--primary-color);
              color: white;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 2rem;
              margin: 0 auto 1.5rem;
            "
          >
            <i class="fas fa-user"></i>
          </div>
          <h2 id="profile-name" style="margin-bottom: 0.5rem">User Name</h2>
          <p
            id="profile-email"
            style="color: var(--text-muted); margin-bottom: 2rem"
          >
            user@example.com
          </p>
          <div style="display: flex; flex-direction: column; gap: 1rem">
            <a href="index.html" class="btn btn-primary">Go Shopping</a>
            <button
              id="logout-btn"
              class="btn"
              style="
                border: 1px solid var(--border-color);
                color: var(--text-main);
              "
            >
              Log Out
            </button>
          </div>
        </div>
      </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/auth-page.js"></script>
  </body>
</html>
