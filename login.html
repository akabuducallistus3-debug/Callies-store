<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Callie's Store</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> -->
    <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container nav-content">
        <a href="index.html" class="logo">Callie's Store</a>
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="index.html#products" class="nav-link">Shop</a></li>
        </ul>
        <div class="nav-actions">
          <button id="theme-toggle" class="icon-btn">
            <i class="fas fa-moon"></i>
          </button>
          <a href="wishlist.html" class="icon-btn"
            ><i class="far fa-heart"></i
            ><span id="wishlist-count" class="badge">0</span></a
          >
          <a href="cart.html" class="icon-btn"
            ><i class="fas fa-shopping-cart"></i
            ><span id="cart-count" class="badge">0</span></a
          >
          <a href="login.html" id="user-btn" class="icon-btn"
            ><i class="far fa-user"></i
          ></a>
        </div>
      </div>
    </nav>

    <main class="container auth-page-main">
      <div id="auth-container">
        <!-- Login Form -->
        <div id="login-form-container">
          <h2 class="auth-title">
            Welcome Back
          </h2>
          <p class="auth-subtitle">
            Log in to your account to continue.
          </p>
          <form id="login-form" class="auth-form">
            <div>
              <label class="auth-label">Email Address</label>
              <input
                type="email"
                id="login-email"
                required
                class="auth-input"
              />
            </div>
            <div>
              <label class="auth-label">Password</label>
              <input
                type="password"
                id="login-password"
                required
                class="auth-input"
              />
            </div>
            <button type="submit" class="btn btn-primary auth-submit-btn">
              Log In
            </button>
          </form>
          <p class="auth-switch-text">
            Don't have an account?
            <a href="#" id="show-signup" class="auth-switch-link">Sign Up</a>
          </p>
        </div>

        <!-- Signup Form -->
        <div id="signup-form-container" class="hidden-section">
          <h2 class="auth-title">
            Create Account
          </h2>
          <p class="auth-subtitle">
            Join Callie's Store today.
          </p>
          <form id="signup-form" class="auth-form">
            <div>
              <label class="auth-label">Full Name</label>
              <input
                type="text"
                id="signup-name"
                required
                class="auth-input"
              />
            </div>
            <div>
              <label class="auth-label">Email Address</label>
              <input
                type="email"
                id="signup-email"
                required
                class="auth-input"
              />
            </div>
            <div>
              <label class="auth-label">Password</label>
              <input
                type="password"
                id="signup-password"
                required
                class="auth-input"
              />
            </div>
            <button type="submit" class="btn btn-primary auth-submit-btn">
              Sign Up
            </button>
          </form>
          <p class="auth-switch-text">
            Already have an account?
            <a href="#" id="show-login" class="auth-switch-link">Log In</a>
          </p>
        </div>

        <!-- User Profile -->
        <div id="profile-container" class="profile-container">
          <div class="profile-avatar">
            <i class="fas fa-user"></i>
          </div>
          <h2 id="profile-name" class="profile-name">User Name</h2>
          <p id="profile-email" class="profile-email">
            user@example.com
          </p>
          <div class="profile-actions">
            <a href="index.html" class="btn btn-primary">Go Shopping</a>
            <button id="logout-btn" class="btn logout-btn">
              Log Out
            </button>
          </div>
        </div>
      </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/auth-page.js"></script>
  </body>
</html>
